            font-family: monospace;

            transform: scale(1.1);
        }

        }
        
        .page-number {

            .main-title {

<body>
    <div class="header">
        <a href="index.html" class="home-btn">← 返回首页</a>
        <div class="nav-buttons">
            <a href="3.html" class="nav-btn">← 上一页</a>
            <a href="5.html" class="nav-btn">下一页 →</a>
        </div>
    </div>
    
    <div class="title-section">
        <h1 class="main-title">~~~~~热病题记——"热病"词源与《黄帝内经》*****</h1>
        <p class="subtitle">"热病"一词的最早出处与医学经典渊源</p>
    </div>
    
    <div class="page-number">4</div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 100%;">题记内容</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="padding: 0;">
                        <div class="preface-title">题 记</div>
                        <div class="preface-content">
                            <span class="highlight-term">"热病"</span>一词，最早出自中国第一部传世医学经典——两千多年前成书的《黄帝内经》。《黄帝内经·灵枢篇》中第二十三篇名曰<span class="highlight-term">"热病"</span>，论述了热病的证候、诊断、治疗及预后。
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <div class="tags-section">
        <div class="tags-title">🏷️ 检索标签（点击可检索）</div>
        <div>
            <span class="tag">热病</span>
            <span class="tag">黄帝内经</span>
            <span class="tag">灵枢篇</span>
            <span class="tag">证候</span>
            <span class="tag">诊断</span>
            <span class="tag">治疗</span>
            <span class="tag">预后</span>
        </div>
    </div>
    
    <div class="copy-section">
        <div class="tags-title">📋 快速复制信息</div>
        <div class="copy-row">
            <input type="text" class="copy-input" id="copyText" value="热病题记——"热病"词源与《黄帝内经》；"热病"一词的最早出处与医学经典渊源；热病,黄帝内经,灵枢篇,证候,诊断,治疗,预后；=4" readonly>
            <button class="copy-btn" onclick="copyToClipboard()">复制</button>
        </div>
    </div>
    
    <button class="favorite-btn" id="favBtn" onclick="addToFavorite()" title="点击收藏">★</button>
    
    <script>
        function copyToClipboard() {
            const input = document.getElementById('copyText');
            input.select();
            input.setSelectionRange(0, 99999);
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(input.value).then(() => {
                    showCopied();
                });
            } else {
                document.execCommand('copy');
                showCopied();
            }
        }
        
        function showCopied() {
            const btn = document.querySelector('.copy-btn');
            btn.textContent = '已复制！';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = '复制';
                btn.classList.remove('copied');
            }, 2000);
        }
        
        function addToFavorite() {
            const btn = document.getElementById('favBtn');
            btn.classList.toggle('added');
            
            if (btn.classList.contains('added')) {
                btn.innerHTML = '✓';
                btn.title = '已收藏';
                
                const favData = {
                    title: '热病题记——"热病"词源与《黄帝内经》',
                    url: window.location.href,
                    page: '4',
                    tags: ['热病', '黄帝内经', '灵枢篇']
                };
                
                let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
                const exists = favorites.find(f => f.page === '4');
                if (!exists) {
                    favorites.push(favData);
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                }
                
                alert('已添加到收藏！请在首页查看收藏内容。');
            } else {
                btn.innerHTML = '★';
                btn.title = '点击收藏';
                
                let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
                favorites = favorites.filter(f => f.page !== '4');
                localStorage.setItem('favorites', JSON.stringify(favorites));
            }
        }
        
        window.onload = function() {
            const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
            const exists = favorites.find(f => f.page === '4');
            if (exists) {
                const btn = document.getElementById('favBtn');
                btn.classList.add('added');
                btn.innerHTML = '✓';
                btn.title = '已收藏';
            }
        };
    </script>
</body>
