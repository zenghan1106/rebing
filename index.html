<html lang="zh-CN">
<head>

    <title>热病55网页版检索系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .main-content {
            padding: 30px;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-success {
            background: #4caf50;
            color: white;
        }

        .btn-success:hover {
            background: #45a049;
        }

        .results {
            margin-top: 30px;
        }

        .result-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.3s;
        }

        .result-item:hover {
            background: #e8eaf6;
            transform: translateX(5px);
        }

        .result-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
            font-size: 16px;
        }

        .result-keywords {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .favorite-btn {
            background: #ffd700;
            color: #333;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }

        .favorite-btn:hover {
            background: #ffed4e;
        }

        .favorite-btn.favorited {
            background: #ff6b6b;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }

        .close-btn {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }

        .add-form {
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
        }

            .header h1 {
                font-size: 22px;
            }

                padding: 20px;
            }

                flex-direction: column;
            }

            .btn {

            color: #666;

    </style>
</head>

        </div>

        </div>

        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

        // 更新统计信息
        function updateStats() {
            document.getElementById('stats').innerHTML =

        // 搜索功能
        function search() {
            const input = document.getElementById('searchInput').value.trim();
            if (!input) {
                alert('请输入搜索关键词！');
                return;
            }

            // 支持用 ；或 + 分隔多个关键词
            const keywords = input.split(/[；+]/).map(k => k.trim()).filter(k => k);
            
            const results = pagesData.filter(page => {
                // 精确匹配：必须包含所有输入的关键词
                return keywords.every(keyword => {
                    return page.keywords.some(pk => 
                        pk.toLowerCase().includes(keyword.toLowerCase())
                    );
                });
            });

            displayResults(results);
        }

        // 显示搜索结果
        function displayResults(results) {
            const container = document.getElementById('results');
            
            if (results.length === 0) {
                container.innerHTML = '<div class="no-results">😔 没有找到相关网页</div>';
                return;
            }

            container.innerHTML = results.map(page => {
                const isFavorited = favorites.includes(page.id);
                return `
                    <div class="result-item" onclick="openPage('${page.id}')">
                        <div class="result-title">${page.title}</div>
                        <div class="result-keywords">关键词：${page.keywords.slice(0, 5).join('；')}${page.keywords.length > 5 ? '...' : ''}</div>
                        <button class="favorite-btn ${isFavorited ? 'favorited' : ''}" 
                                onclick="event.stopPropagation(); toggleFavorite('${page.id}')">
                            ${isFavorited ? '❤️ 已收藏' : '🤍 收藏'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        // 打开网页
        function openPage(id) {
            window.open(`${id}.html`, '_blank');
        }

        // 切换收藏状态
        function toggleFavorite(id) {
            const index = favorites.indexOf(id);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(id);
            }
            
            localStorage.setItem('favorites', JSON.stringify(favorites));
            updateStats();
            
            // 刷新显示
            const currentInput = document.getElementById('searchInput').value.trim();
            if (currentInput) {
                search();
            }
        }

        // 显示收藏夹
        function showFavorites() {
            const favoritesList = document.getElementById('favoritesList');
            const favPages = pagesData.filter(page => favorites.includes(page.id));

            if (favPages.length === 0) {
                favoritesList.innerHTML = '<div class="no-results">暂无收藏</div>';
            } else {
                favoritesList.innerHTML = favPages.map(page => `
                    <div class="result-item" onclick="openPage('${page.id}')">
                        <div class="result-title">${page.title}</div>
                        <button class="favorite-btn favorited" 
                                onclick="event.stopPropagation(); toggleFavorite('${page.id}')">
                            ❤️ 取消收藏
                        </button>
                    </div>
                `).join('');
            }

            document.getElementById('favoritesModal').classList.add('active');
        }

        // 显示添加模态框
        function showAddModal() {
            document.getElementById('addModal').classList.add('active');
        }

        // 关闭模态框
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // 添加新网页
        function addNewPage() {
            const id = document.getElementById('newId').value.trim();
            const keywords = document.getElementById('newKeywords').value.trim();

            if (!id || !keywords) {
                alert('请填写完整信息！');
                return;
            }

            const keywordArray = keywords.split('；').map(k => k.trim());
            
            pagesData.push({
                id: id,
                keywords: keywordArray,
                title: keywordArray[0] || '未命名'
            });

            // 保存到本地存储
            localStorage.setItem('pagesData', JSON.stringify(pagesData));

            alert('添加成功！');
            closeModal('addModal');
            document.getElementById('newId').value = '';
            document.getElementById('newKeywords').value = '';
            updateStats();
        }
