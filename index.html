<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>感染性疾病辅助检索工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #f0f9ff; padding: 10px; }
.container { max-width: 800px; margin: 0 auto; }

/* 标题居中 */
.header { background: #0ea5e9; color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 15px; }
.header h1 { font-size: 24px; margin-bottom: 5px; }
.header p { font-size: 14px; opacity: 0.9; }

/* 搜索框 */
.search-box { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
.input-row { display: flex; gap: 8px; margin-bottom: 10px; }
#searchInput { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 500; min-height: 44px; /* 手机端最小触摸目标 */ }
.btn:active { transform: scale(0.97); }
.btn-primary { background: #0ea5e9; color: white; }
.btn-secondary { background: #e2e8f0; color: #333; }
.btn-danger { background: #ef4444; color: white; }

/* 结果表格 */
.results-table { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.table-header { display: flex; background: #0ea5e9; color: white; font-weight: bold; font-size: 14px; padding: 12px 10px; }
.table-row { display: flex; flex-wrap: wrap; border-bottom: 1px solid #e2e8f0; cursor: pointer; transition: background 0.2s; }
.table-row:hover { background: #f0f9ff; }
.table-row:last-child { border-bottom: none; }
.table-cell { padding: 10px; font-size: 14px; display: flex; align-items: center; }
.cell-id { width: 60px; flex-shrink: 0; justify-content: center; }
.cell-id span { background: #0ea5e9; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
.cell-title-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.cell-title { font-weight: 500; color: #1e293b; line-height: 1.4; }
.cell-keywords-text { font-size: 12px; color: #64748b; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cell-action { width: 80px; flex-shrink: 0; justify-content: center; }
.cell-action button { padding: 6px 12px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; background: #fef3c7; color: #92400e; }
.cell-action button.favorited { background: #fde68a; }
.table-empty { text-align: center; padding: 40px; color: #94a3b8; font-size: 14px; }

/* 响应式表格 */
@media (max-width: 700px) {
  .cell-action { width: 70px; }
  .cell-action button { padding: 6px 8px; font-size: 11px; }
  .table-cell { padding: 8px 6px; font-size: 13px; }
  .cell-keywords-text { display: none; }
}
@media (max-width: 500px) {
  .cell-action { width: 60px; }
}

/* 模态框 */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; }
.modal-overlay.active { display: flex; align-items: center; justify-content: center; }
.modal { background: white; padding: 20px; width: 90%; max-width: 500px; border-radius: 10px; max-height: 80vh; overflow-y: auto; }
.modal input, .modal textarea { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
.modal textarea { min-height: 80px; }
.modal-buttons { display: flex; gap: 8px; margin-top: 15px; }

/* 收藏列表 */
.fav-item { background: #f8fafc; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
.fav-item-info { flex: 1; min-width: 0; }
.fav-item-id { font-size: 12px; color: #0ea5e9; font-weight: bold; margin-bottom: 4px; }
.fav-item-title { font-size: 14px; color: #333; word-break: break-word; }
.fav-item-actions { display: flex; gap: 8px; flex-shrink: 0; }
.fav-item-actions button { padding: 10px 16px; font-size: 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; min-width: 60px; }
.fav-item-actions button:first-child { background: #0ea5e9; color: white; }
.fav-item-actions button:last-child { background: #e2e8f0; color: #333; }
.fav-item-actions button:active { transform: scale(0.95); }

/* Toast提示 */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1000; opacity: 0; transition: all 0.3s; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* 版权信息 */
.footer { text-align: center; padding: 20px; margin-top: 30px; font-size: 12px; color: #666; border-top: 1px solid #e2e8f0; }

/* 响应式 */
@media (max-width: 600px) {
  .btn { padding: 12px 16px; font-size: 14px; }
  .header h1 { font-size: 20px; }
}
</style>
</head>
<body>
<div class="container">
  <!-- 标题居中 -->
  <div class="header">
    <h1>🦠 感染性疾病辅助检索工具</h1>
    <p id="info">加载中...</p>
  </div>

  <!-- 搜索框 -->
  <div class="search-box">
    <div class="input-row">
      <input type="text" id="searchInput" placeholder="输入关键词，用 ; 或 + 分隔">
      <button class="btn btn-danger" id="clearBtn">清空</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="favBtn">⭐ 收藏夹 <span id="favCount" style="display:none;">0</span></button>
      <button class="btn btn-primary" id="addBtn">➕ 添加网页</button>
      <button class="btn btn-secondary" id="voiceBtn">🎤 语音</button>
      <button class="btn btn-secondary" id="splitBtn">＋ 分割</button>
    </div>
  </div>

  <!-- 结果计数 -->
  <div id="resultCount" style="padding: 10px; color: #666; font-size: 14px;"></div>

  <!-- 结果列表 -->
  <div id="results"></div>

  <!-- 版权信息 -->
  <div class="footer">
    资源来自网络，如有侵权，请联系微信 zh52662006 进行删除
  </div>
</div>

<!-- 添加网页模态框 -->
<div id="addModal" class="modal-overlay">
  <div class="modal">
    <h3>添加新网页</h3>
    <input type="text" id="addId" placeholder="网页ID（数字）">
    <input type="text" id="addTitle" placeholder="标题（可选）">
    <textarea id="addKeywords" placeholder="关键词（用 ; 分隔）"></textarea>
    <div class="modal-buttons">
      <button class="btn btn-primary" id="addConfirm">添加</button>
      <button class="btn btn-secondary" data-close="true">取消</button>
    </div>
  </div>
</div>

<!-- 收藏夹模态框 -->
<div id="favModal" class="modal-overlay">
  <div class="modal">
    <h3>我的收藏</h3>
    <div id="favList"></div>
    <div class="modal-buttons">
      <button class="btn btn-secondary" data-close="true">关闭</button>
    </div>
  </div>
</div>

<!-- Toast提示 -->
<div id="toast" class="toast"></div>

<!-- 加载数据文件和主程序 -->
<script src="DATA.js"></script>
<script src="app.js"></script>
</body>
</html>
