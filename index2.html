            }

            // 搜索：每个关键词模糊匹配
            const results = pages.filter(page => {
                // 页面所有文本
                const pageText = (page.title + ' ' + page.keywords.join(' ')).toLowerCase();
                
                // 所有关键词都必须匹配（AND逻辑）
                return searchKeywords.every(sk => {
                    const skLower = sk.toLowerCase();
                    // 模糊匹配：关键词是页面文本的子串
                    return pageText.includes(skLower);
                });
            });

            renderResults(results, searchKeywords);
        }

        function renderResults(results, highlightKeywords) {
            const container = document.getElementById('resultsList');
            const countEl = document.getElementById('resultCount');
            
            countEl.textContent = `找到 ${results.length} 个结果`;
            
            if (results.length === 0) {
                container.innerHTML = '<div class="no-result">未找到匹配结果<br>请尝试其他关键词</div>';
                return;
            }

            container.innerHTML = results.map(page => {
                const isFav = favorites.some(f => f.id === page.id);
                
                // 高亮显示匹配的关键词
                let keywordsHtml = page.keywords.map(kw => {
                    const isMatch = highlightKeywords.some(hk => 
                        kw.toLowerCase().includes(hk.toLowerCase()) || 
                        hk.toLowerCase().includes(kw.toLowerCase())
                    );
                    return isMatch ? `<span class="highlight">${kw}</span>` : kw;
                }).join('；');

                return `
                    <div class="result-item">
                        <div class="result-title">${escapeHtml(page.title)}</div>
                        <div class="result-keywords">${keywordsHtml}</div>
                        <div class="result-actions">
                            <a href="${page.url}" target="_blank">🔗 打开网页</a>
                            <button class="star-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${page.id}')" title="${isFav ? '取消收藏' : '收藏'}">
                                ${isFav ? '⭐' : '☆'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('resultsList').innerHTML = '<div class="no-result">输入关键词开始检索，或使用 + / ；分隔多个关键词</div>';
            document.getElementById('resultCount').textContent = '';
        }

        // ==================== 收藏功能 ====================
        function toggleFavorite(pageId) {
            const index = favorites.findIndex(f => f.id === pageId);
            
            if (index > -1) {
                // 取消收藏
                favorites.splice(index, 1);
                showToast('已取消收藏');
            } else {
                // 添加收藏
                const page = pages.find(p => p.id === pageId);
                if (page) {
                    favorites.push({
                        id: page.id,
                        title: page.title,
                        url: page.url
                    });
                    showToast('已添加到收藏夹');
                }
            }
            
            saveFavorites();
            
            // 刷新当前搜索结果中的收藏状态
            const input = document.getElementById('searchInput').value.trim();
            if (input) {
                const searchKeywords = input.split(/[+；;]/).map(k => k.trim()).filter(k => k);
                const results = pages.filter(page => {
                    const pageText = (page.title + ' ' + page.keywords.join(' ')).toLowerCase();
                    return searchKeywords.every(sk => pageText.includes(sk.toLowerCase()));
                });
                renderResults(results, searchKeywords);
            }
        }
