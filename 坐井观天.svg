<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250">
  <rect width="200" height="250" rx="16" fill="#E8F4FD"/>
  <!-- 井壁 -->
  <rect x="50" y="40" width="100" height="180" rx="0" fill="#B0BEC5" opacity="0.4"/>
  <rect x="50" y="40" width="100" height="180" rx="0" fill="none" stroke="#78909C" stroke-width="4"/>
  <rect x="60" y="40" width="80" height="180" rx="0" fill="#CFD8DC" opacity="0.3"/>
  <!-- 天空 -->
  <rect x="55" y="42" width="90" height="30" rx="0" fill="#87CEEB" opacity="0.5"/>
  <circle cx="120" cy="52" r="8" fill="#FFD43B" opacity="0.6"/>
  <!-- 青蛙在井底 -->
  <g transform="translate(100,180)">
    <ellipse cx="0" cy="10" rx="22" ry="14" fill="#4CAF50"/>
    <circle cx="-8" cy="-2" r="8" fill="#66BB6A"/>
    <circle cx="8" cy="-2" r="8" fill="#66BB6A"/>
    <circle cx="-6" cy="-3" r="2.5" fill="#333"/>
    <circle cx="6" cy="-3" r="2.5" fill="#333"/>
    <path d="M-2 2 Q0 5 2 2" fill="none" stroke="#333" stroke-width="1"/>
    <line x1="-14" y1="-6" x2="-14" y2="-14" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="-6" x2="14" y2="-14" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
